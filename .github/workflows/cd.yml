name: CD

on:
  push:
    branches:
      - dev
      - feature/health-db-v2
    paths-ignore:
      - "helm/values.dev.yaml"

permissions:
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  VALUES_FILE: helm/values.dev.yaml

jobs:
  build-push-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JKD 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Run tests
        run: ./gradlew test
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - name: Build and Push Docker image
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Update Helm values image.tag
        run: |
          sed -i -E "s|(^[[:space:]]*tag:[[:space:]]*).*$|\1\"$IMAGE_TAG\"|g" "$VALUES_FILE"
      - name: Commit and Push values file
        run: |
          git add "$VALUES_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update image tag to $IMAGE_TAG [skip ci]"
          git push
