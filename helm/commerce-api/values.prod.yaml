
api:
  replicaCount: 1
  rollme: "v1"
  image:
    repository: api-server
    pullPolicy: Always

  containerPort: 8080    

  env:
    datasource:
      host: mariadb
      url: jdbc:mariadb://mariadb:3306/commerce
      username: root
      password: admin123
      database: commerce
      port: 3306

  probes:
    path: /healthz
    port: 8080
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 5

  service:
    name: api-svc
    type: ClusterIP
    port: 8080
    targetPort: 8080
    protocol: TCP

#mariadb
mariadb:
  fullnameOverride: "mariadb"
  architecture: standalone

  auth:
    database: commerce_real
    rootPassword: "admin12345"

  primary:
    persistence:
      size: 5Gi
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi

ingress:
  enabled: true
  name: commerce-ingress
  host: commerce.com
  path: / 
  pathType: Prefix
  
  backendServiceName: api-svc
  backendServicePort: 8080  

