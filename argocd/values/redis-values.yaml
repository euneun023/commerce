architecture: standalone

image:
  registry: docker.io
  repository: bitnamilegacy/redis
  tag: 7.2.5-debian-12-r4

auth:
  enabled: true
  password: "redis1234"

master:
  persistence:
    enabled: true
    size: 2Gi

metrics:
  enabled: false
  image:
    registry: docker.io
    repository: bitnamilegacy/redis-exporter
    tag: 1.62.0-debian-12-r2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
