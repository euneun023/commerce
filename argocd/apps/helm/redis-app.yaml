apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: redis
      targetRevision: 19.6.4
      helm:
        valueFiles:
          - $values/argocd/values/redis-values.yaml
    - repoURL: https://github.com/euneun023/commerce.git
      targetRevision: feature/health-db-v2
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: commerce
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

