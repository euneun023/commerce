apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.13.2
    helm:
      values: | 
        grafana:
          adminPassword: admin1234
          service:
            type: ClusterIP

        prometheus:
          service:
            type: ClusterIP
          prometheusSpec:
            serviceMonitorSelectoNilUsesHelmValues: false
        
    destination:
      server: https://kubernetes.default.svc
      namespace: monitoring

    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

     


