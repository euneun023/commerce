apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: commerce-api-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: commerce-api.rules
      rules:
        - alert: CommerceApiHigh5xxRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="commerce",status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="commerce"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            service: commerce-api
          annotations:
            summary: "commerce-api 5xx error rate > 5%"
            description: "최근 5분간 5xx 비율이 5%를 초과했습니다."

        - alert: CommerceApiHighP95Latency
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(http_server_requests_seconds_bucket{namespace="commerce"}[5m])
              )
            ) > 0.2
          for: 5m
          labels:
            severity: warning
            service: commerce-api
          annotations:
            summary: "commerce-api p95 latency > 200ms"
            description: "최근 5분간 p95 latency가 200ms를 초과했습니다."

        - alert: RedisDown
          expr: |
            up{namespace="redis"} == 0
          for: 2m
          labels:
            severity: critical
            service: redis
          annotations:
            summary: "Redis is down"
            description: "Redis 타겟 scrape가 실패했습니다."
            
        - alert: WatchdogTest
          expr: vector(1)
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Test alert"
            description: "Slack webhook test"

        - alert: SlackSendTest
          expr: vector(1)
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Slack send test"
           description: "Alertmanager to Slack delivery test"
