apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-deploy
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api
      annotations:
        rollme: {{ .Values.api.rollme | quote }}
    spec:
      containers: 
      - name: api-container
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default "latest" }}"
        ports:
        - containerPort: {{ .Values.api.containerPort }}
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        env:
          - name: SPRING_DATASOURCE_URL
            value: {{ .Values.api.env.datasource.url | quote }}
          - name: SPRING_DATASOURCE_USERNAME
            value: {{ .Values.api.env.datasource.username | quote }}
          - name: SPRING_DATASOURCE_PASSWORD
            value: {{ .Values.api.env.datasource.password | quote }}
        livenessProbe:
          httpGet:
            path: {{ .Values.api.probes.path }}
            port: {{ .Values.api.probes.port }}
          initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.api.probes.path }}
            port: {{ .Values.api.probes.port }}
          initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}

---
apiVersion: v1
kind: Service

metadata:
  name: api-svc
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app: api  #deployment의 selector.matchLables.app 와 동일
  ports:
    - protocol: {{ .Values.api.service.protocol }}
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
