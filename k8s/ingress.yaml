apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerce-ingress
annotations:
  kubernetes.io/ingress.class: alb
  alb.ingress.kubernetes.io/sheme: internet-facing
  alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - host: commerce.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-svc
            port:
              number: 8080
